<!DOCTYPE html>
<html lang="en" 
    x-data="{ 
        darkMode: localStorage.getItem('theme') === 'dark',
        isRtl: localStorage.getItem('rtl') === 'true',
        submitted: false,
        countdown: { d: '00', h: '00', m: '00', s: '00' },
        initCountdown() {
            const end = new Date().getTime() + (15 * 24 * 60 * 60 * 1000); // 15 days from now
            setInterval(() => {
                const now = new Date().getTime();
                const diff = end - now;
                this.countdown.d = Math.floor(diff / (1000 * 60 * 60 * 24));
                this.countdown.h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                this.countdown.m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
                this.countdown.s = Math.floor((diff % (1000 * 60)) / 1000);
            }, 1000);
        }
    }" 
    x-init="
        initCountdown();
        $watch('darkMode', val => { document.documentElement.classList.toggle('dark', val); localStorage.setItem('theme', val ? 'dark' : 'light'); });
        $watch('isRtl', val => { document.documentElement.dir = val ? 'rtl' : 'ltr'; localStorage.setItem('rtl', val); });
        document.documentElement.classList.toggle('dark', darkMode);
        document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
    "
    :class="{'dark': darkMode}"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/design.png">
    <title>VexaDesign | Coming Soon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#6366f1' } } }
        }
    </script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-white dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 transition-colors duration-500 overflow-hidden">

    <nav class="fixed top-0 w-full p-6 flex justify-between items-center z-50">
        <!-- <a href="index.html" class="text-xl font-bold tracking-tighter uppercase">Vexa.</a> -->
        <a href="index.html">
<div class="flex items-center gap-3">
                            <div class="w-10 h-10 bg-primary/20 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-100/50 dark:shadow-none transition-transform hover:rotate-6 overflow-hidden">
    <img src="assets/design.png" alt="icon" class="w-6 h-6 object-contain">
</div>
                <span class="font-black text-2xl tracking-tighter dark:text-white">VexaDesign</span>
            </div>
            </a> 
        <div class="flex items-center gap-3">
            <button @click="isRtl = !isRtl" class="text-[10px] font-black border border-zinc-200 dark:border-zinc-800 px-3 py-1.5 rounded-xl uppercase transition-colors hover:bg-zinc-100 dark:hover:bg-zinc-800">
                <span x-text="isRtl ? 'LTR' : 'RTL'"></span>
            </button>
            <button @click="darkMode = !darkMode" class="p-2.5 bg-zinc-100 dark:bg-zinc-800 rounded-xl transition-all hover:scale-110">
                <span x-show="!darkMode">🌙</span><span x-show="darkMode">☀️</span>
            </button>
        </div>
    </nav>

    <main class="min-h-screen flex flex-col items-center justify-center p-6 relative">
        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>

        <div class="max-w-4xl w-full text-center relative z-10">
            <span class="inline-block px-4 py-1.5 mb-6 text-xs font-bold tracking-widest text-primary uppercase bg-indigo-50 dark:bg-indigo-900/30 rounded-full animate-pulse">
                New Experience Loading
            </span>
            
            <h1 class="text-5xl md:text-8xl font-semibold  mb-8 tracking-tighter leading-tight">
                Something <span class="text-primary italic">Beautiful</span> Is Coming.
            </h1>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12 max-w-2xl mx-auto">
                <div class="bg-zinc-50 dark:bg-zinc-900 p-6 rounded-[2rem] border dark:border-zinc-800">
                    <p class="text-4xl font-black mb-1" x-text="countdown.d"></p>
                    <p class="text-[10px] uppercase tracking-widest font-bold text-zinc-400">Days</p>
                </div>
                <div class="bg-zinc-50 dark:bg-zinc-900 p-6 rounded-[2rem] border dark:border-zinc-800">
                    <p class="text-4xl font-black mb-1" x-text="countdown.h"></p>
                    <p class="text-[10px] uppercase tracking-widest font-bold text-zinc-400">Hours</p>
                </div>
                <div class="bg-zinc-50 dark:bg-zinc-900 p-6 rounded-[2rem] border dark:border-zinc-800">
                    <p class="text-4xl font-black mb-1" x-text="countdown.m"></p>
                    <p class="text-[10px] uppercase tracking-widest font-bold text-zinc-400">Mins</p>
                </div>
                <div class="bg-zinc-50 dark:bg-zinc-900 p-6 rounded-[2rem] border dark:border-zinc-800">
                    <p class="text-4xl font-black mb-1" x-text="countdown.s"></p>
                    <p class="text-[10px] uppercase tracking-widest font-bold text-zinc-400">Secs</p>
                </div>
            </div>

            <div class="max-w-md mx-auto">
                <div x-show="!submitted">
                    <p class="text-zinc-500 mb-8 font-medium">Be the first to know when we launch the AI interior studio.</p>
                    <form @submit.prevent="submitted = true; setTimeout(() => window.location.href='index.html', 2000)" class="flex flex-col sm:flex-row gap-3">
                        <input type="email" required placeholder="Enter your email" class="flex-grow px-6 py-4 rounded-2xl bg-white dark:bg-zinc-900 border-2 border-zinc-100 dark:border-zinc-800 focus:border-primary focus:outline-none transition-all">
                        <button type="submit" class="px-8 py-4 bg-zinc-900 dark:bg-white text-white dark:text-zinc-900 rounded-2xl font-black hover:scale-105 transition-all active:scale-95">
                            Notify Me
                        </button>
                    </form>
                </div>

                <div x-show="submitted" x-cloak class="p-8 bg-green-50 dark:bg-green-900/20 rounded-[2.5rem] border border-green-100 dark:border-green-800">
                    <p class="text-green-600 dark:text-green-400 font-bold mb-2 text-xl">You're on the list! ✨</p>
                    <p class="text-sm text-green-700/60 dark:text-green-400/60">Redirecting you to our home page...</p>
                </div>
            </div>
        </div>

        <div class="absolute bottom-10 inset-x-0 text-center">
            <a href="index.html" class="text-sm font-bold text-zinc-400 hover:text-primary transition-colors flex items-center justify-center gap-2">
                <span>Go back to home</span>
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8l4 4m0 0l-4 4m4-4H3"/></svg>
            </a>
        </div>
    </main>

</body>
</html>
