<!DOCTYPE html>
<html lang="en" 
    x-data="{ 
        darkMode: localStorage.getItem('theme') === 'dark',
        isRtl: localStorage.getItem('rtl') === 'true'
    }" 
    x-init="
        $watch('darkMode', val => { document.documentElement.classList.toggle('dark', val); localStorage.setItem('theme', val ? 'dark' : 'light'); });
        $watch('isRtl', val => { document.documentElement.dir = val ? 'rtl' : 'ltr'; localStorage.setItem('rtl', val); });
        document.documentElement.classList.toggle('dark', darkMode);
        document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
    "
    :class="{'dark': darkMode}"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/home.png">
    <title>VexaDesign | Create Account</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#6366f1' } } }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        /* Balanced scroll behavior */
        @media (min-height: 850px) and (min-width: 1024px) {
            body { overflow: hidden; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-gray-950 transition-colors duration-300 min-h-screen">

    <div class="fixed top-4 sm:top-6 inset-x-0 z-50 pointer-events-none">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 flex justify-between items-center pointer-events-auto">
            <a href="index.html" class="flex items-center gap-2 group">
                <div class="w-8 h-8 sm:w-10 sm:h-10 bg-primary rounded-lg sm:rounded-xl flex items-center justify-center shadow-lg group-hover:rotate-6 transition-transform">
                    <svg class="w-5 h-5 sm:w-6 sm:h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" /></svg>
                </div>
                <span class="font-black text-lg sm:text-xl dark:text-white">VexaDesign</span>
            </a>

            <div class="flex gap-1.5 sm:gap-2">
                <button @click="isRtl = !isRtl" class="p-2 sm:p-2.5 bg-white dark:bg-gray-900 rounded-lg sm:rounded-xl shadow-sm border dark:border-gray-800 text-[9px] font-black uppercase dark:text-white hover:border-primary transition-all">
                    <span x-text="isRtl ? 'LTR' : 'RTL'"></span>
                </button>
                <button @click="darkMode = !darkMode" class="p-2 sm:p-2.5 bg-white dark:bg-gray-900 rounded-lg sm:rounded-xl shadow-sm border dark:border-gray-800 transition-all hover:border-primary">
                    <span x-show="!darkMode">🌙</span>
                    <span x-show="darkMode">☀️</span>
                </button>
            </div>
        </div>
    </div>

    <main class="min-h-screen flex items-center justify-center p-3 sm:p-4 lg:p-6 pt-20 sm:pt-24 lg:pt-6">
        <div class="w-full max-w-[1050px] grid lg:grid-cols-2 bg-white dark:bg-gray-900 rounded-[2rem] sm:rounded-[2.5rem] lg:rounded-[3.5rem] shadow-2xl overflow-hidden border dark:border-gray-800">
            
            <div class="hidden lg:flex relative bg-primary p-10 overflow-hidden flex-col justify-between">
                <div class="absolute inset-0 bg-gradient-to-br from-primary to-indigo-900 opacity-90"></div>
                <img src="https://images.unsplash.com/photo-1616489953149-80795410a48b?q=80&w=2000&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay">
                
                <div class="relative z-10">
                    <h2 class="text-4xl font-black leading-tight text-white">Your Design Journey <br>Starts Right Here.</h2>
                </div>
                
                <div class="relative z-10 space-y-4">
                    <div class="flex items-center gap-4 bg-white/10 backdrop-blur-md p-4 rounded-2xl border border-white/20">
                        <div class="w-10 h-10 bg-white/20 rounded-full flex items-center justify-center text-white"><i class="fas fa-magic"></i></div>
                        <p class="font-bold text-sm text-white">AI-Powered Transformation</p>
                    </div>
                </div>
            </div>

            <div class="p-5 sm:p-8 md:p-12 lg:py-10 flex flex-col justify-center">
                <div class="w-full">
                    <h3 class="text-xl sm:text-2xl lg:text-3xl font-black mb-1 dark:text-white text-center tracking-tight">Create Account</h3>
                    <!-- <p class="text-gray-500 mb-5 sm:mb-6 text-[12px] sm:text-sm font-medium">Join 10k+ enthusiasts today.</p> -->

                    <div class="grid grid-cols-2 gap-2 sm:gap-3 mb-5 sm:mb-6">
                        <button class="flex items-center justify-center gap-2 py-3 border-2 dark:border-gray-800 rounded-xl font-bold text-[10px] sm:text-xs hover:bg-gray-50 dark:hover:bg-gray-800 dark:text-white transition-all">
                            <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-3.5 h-3.5 sm:w-4 sm:h-4">
                            <span>Google</span>
                        </button>
                        <button class="flex items-center justify-center gap-2 py-3 border-2 dark:border-gray-800 rounded-xl font-bold text-[10px] sm:text-xs hover:bg-gray-50 dark:hover:bg-gray-800 dark:text-white transition-all">
                            <i class="fab fa-apple text-sm sm:text-lg"></i>
                            <span>Apple</span>
                        </button>
                    </div>

                    <div class="relative flex items-center mb-5 sm:mb-6">
                        <div class="flex-grow border-t dark:border-gray-800"></div>
                        <span class="px-3 text-[8px] sm:text-[9px] font-black text-gray-400 uppercase tracking-widest">Or Email</span>
                        <div class="flex-grow border-t dark:border-gray-800"></div>
                    </div>

                    <form class="space-y-3.5 sm:space-y-4">
                        <div class="space-y-1">
                            <label class="text-[8px] sm:text-[9px] font-black uppercase tracking-[0.2em] text-gray-400 px-1">Full Name</label>
                            <div class="relative group">
                                <i class="far fa-user absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs transition-colors"></i>
                                <input type="text" required placeholder="John Doe" class="w-full pl-10 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-gray-900 focus:outline-none dark:text-white transition-all text-xs sm:text-sm">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[8px] sm:text-[9px] font-black uppercase tracking-[0.2em] text-gray-400 px-1">Email</label>
                            <div class="relative group">
                                <i class="far fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs transition-colors"></i>
                                <input type="email" required placeholder="name@company.com" class="w-full pl-10 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-gray-900 focus:outline-none dark:text-white transition-all text-xs sm:text-sm">
                            </div>
                        </div>

                        <div class="space-y-1">
                            <label class="text-[8px] sm:text-[9px] font-black uppercase tracking-[0.2em] text-gray-400 px-1">Password</label>
                            <div class="relative group">
                                <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-400 text-xs transition-colors"></i>
                                <input type="password" required placeholder="Min. 8 chars" class="w-full pl-10 pr-4 py-3 rounded-xl bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-gray-900 focus:outline-none dark:text-white transition-all text-xs sm:text-sm">
                            </div>
                        </div>

                        <div class="flex items-start gap-2.5 px-1 py-0.5">
                            <div class="relative mt-0.5 shrink-0">
                                <input type="checkbox" id="terms" required class="sr-only peer">
                                <div class="w-4 h-4 border-2 border-gray-300 dark:border-gray-700 rounded peer-checked:bg-primary peer-checked:border-primary transition-all"></div>
                                <i class="fas fa-check absolute inset-0 text-[8px] text-white flex items-center justify-center opacity-0 peer-checked:opacity-100"></i>
                            </div>
                            <label for="terms" class="text-[9px] sm:text-[10px] font-bold text-gray-500 cursor-pointer leading-tight">
                                I agree to the <a href="#" class="text-primary hover:underline">Terms</a> and <a href="#" class="text-primary hover:underline">Privacy Policy</a>
                            </label>
                        </div>

                        <button type="submit" class="w-full py-3.5 sm:py-4 bg-primary text-white rounded-xl font-black text-sm sm:text-base shadow-xl shadow-indigo-200 dark:shadow-none hover:bg-indigo-700 transition-all active:scale-95">
                            Create Account
                        </button>
                    </form>

                    <p class="mt-5 text-center text-[11px] sm:text-xs text-gray-500 font-medium">
                        Already have an account? <a href="login.html" class="text-primary font-bold hover:underline">Log in</a>
                    </p>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
