<!DOCTYPE html>
<html lang="en" 
    x-data="{ 
        isForgot: false,
        darkMode: localStorage.getItem('theme') === 'dark',
        isRtl: localStorage.getItem('rtl') === 'true'
    }" 
    x-init="
        $watch('darkMode', val => { document.documentElement.classList.toggle('dark', val); localStorage.setItem('theme', val ? 'dark' : 'light'); });
        $watch('isRtl', val => { document.documentElement.dir = val ? 'rtl' : 'ltr'; localStorage.setItem('rtl', val); });
        document.documentElement.classList.toggle('dark', darkMode);
        document.documentElement.dir = isRtl ? 'rtl' : 'ltr';
    "
    :class="{'dark': darkMode}"
>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="assets/design.png">
    <title>VexaDesign | Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { primary: '#6366f1' } } }
        }
    </script>
    <style>[x-cloak] { display: none !important; }</style>
</head>
<body class="bg-slate-50 dark:bg-gray-950 transition-colors duration-300 min-h-screen">

    <div class="fixed top-4 sm:top-6 inset-x-0 z-50 pointer-events-none">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 flex justify-between items-center pointer-events-auto">
            <a href="index.html" class="flex items-center gap-2 group">
                           <div class="w-10 h-10 bg-primary/20 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-100/50 dark:shadow-none transition-transform hover:rotate-6 overflow-hidden">
    <img src="assets/design.png" alt="icon" class="w-6 h-6 object-contain">
</div>
                <span class="font-black text-lg sm:text-xl dark:text-white">VexaDesign</span>
            </a>

            <div class="flex gap-2">
                <button @click="isRtl = !isRtl" class="px-2 py-2 sm:p-3 bg-white dark:bg-gray-900 rounded-lg sm:rounded-xl shadow-sm border dark:border-gray-800 text-[9px] font-black uppercase dark:text-white">
                    <span x-text="isRtl ? 'LTR' : 'RTL'"></span>
                </button>
                <button @click="darkMode = !darkMode" class="p-2 sm:p-3 bg-white dark:bg-gray-900 rounded-lg sm:rounded-xl shadow-sm border dark:border-gray-800 transition-all">
                    <span x-show="!darkMode">🌙</span>
                    <span x-show="darkMode">☀️</span>
                </button>
            </div>
        </div>
    </div>

    <main class="min-h-screen flex items-center justify-center p-4 sm:p-6 pt-24 pb-12">
        <div class="w-full max-w-[1100px] grid lg:grid-cols-2 bg-white dark:bg-gray-900 rounded-[2rem] sm:rounded-[3.5rem] shadow-2xl overflow-hidden border dark:border-gray-800">
            
            <div class="hidden lg:block relative bg-primary p-12 overflow-hidden">
                <div class="absolute inset-0 bg-gradient-to-br from-primary to-indigo-900 opacity-90"></div>
                <img src="https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?q=80&w=2000&auto=format&fit=crop" class="absolute inset-0 w-full h-full object-cover mix-blend-overlay">
                
                <div class="relative z-10 h-full flex flex-col justify-between text-white">
                    <h2 class="text-4xl font-black leading-tight">Mastering the Art of <br>Modern Interiors.</h2>
                    <div class="bg-white/10 backdrop-blur-md p-8 rounded-[2.5rem] border border-white/20">
                        <p class="italic text-lg mb-6 opacity-90">"The AI transformation tool changed how I view my home. Absolutely magical!"</p>
                        <div class="flex items-center gap-4">
                            <img src="https://i.pravatar.cc/100?u=pradeep" class="w-12 h-12 rounded-2xl border-2 border-white/30">
                            <div>
                                <p class="font-bold">Pradeep Kumar</p>
                                <p class="text-xs opacity-60">Verified Architect</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="p-6 sm:p-10 md:p-16 flex flex-col justify-center">
                
                <div x-show="!isForgot">
                    <h3 class="text-2xl sm:text-3xl font-black mb-2 dark:text-white  text-center tracking-tight">Welcome Back</h3>
                    <!-- <p class="text-gray-500 mb-6 sm:mb-8 text-sm font-medium">Please enter your credentials to continue.</p> -->

                    <div class="grid grid-cols-2 gap-3 sm:gap-4 mb-8">
                        <button class="flex items-center justify-center gap-2 py-3.5 border-2 dark:border-gray-800 rounded-xl sm:rounded-2xl font-bold text-[11px] sm:text-sm hover:bg-gray-50 dark:hover:bg-gray-800 dark:text-white transition-all">
                            <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-4 h-4 sm:w-5 sm:h-5">
                            <span>Google</span>
                        </button>
                        <button class="flex items-center justify-center gap-2 py-3.5 border-2 dark:border-gray-800 rounded-xl sm:rounded-2xl font-bold text-[11px] sm:text-sm hover:bg-gray-50 dark:hover:bg-gray-800 dark:text-white transition-all">
                            <i class="fab fa-apple text-base sm:text-xl"></i>
                            <span>Apple</span>
                        </button>
                    </div>

                    <div class="relative flex items-center mb-8">
                        <div class="flex-grow border-t dark:border-gray-800"></div>
                        <span class="px-4 text-[9px] sm:text-[10px] font-black text-gray-400 uppercase tracking-widest">Or Secure Email</span>
                        <div class="flex-grow border-t dark:border-gray-800"></div>
                    </div>

                    <form class="space-y-4 sm:space-y-6">
                        <div class="space-y-1.5 sm:space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 px-1">Email Address</label>
                            <div class="relative">
                                <i class="far fa-envelope absolute left-4 sm:left-5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                <input type="email" required placeholder="name@email.com" class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3.5 sm:py-4 rounded-xl sm:rounded-2xl bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-gray-900 focus:outline-none dark:text-white transition-all text-sm">
                            </div>
                        </div>

                        <div class="space-y-1.5 sm:space-y-2">
                            <label class="text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 px-1">Password</label>
                            <div class="relative">
                                <i class="fas fa-lock absolute left-4 sm:left-5 top-1/2 -translate-y-1/2 text-gray-400 text-sm"></i>
                                <input type="password" required placeholder="••••••••" class="w-full pl-11 sm:pl-12 pr-4 sm:pr-5 py-3.5 sm:py-4 rounded-xl sm:rounded-2xl bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-primary focus:bg-white dark:focus:bg-gray-900 focus:outline-none dark:text-white transition-all text-sm">
                            </div>
                        </div>

                        <div class="flex flex-row items-center justify-between px-1 gap-2">
                            <label class="flex items-center gap-2 cursor-pointer">
                                <input type="checkbox" class="sr-only peer">
                                <div class="w-4 h-4 sm:w-5 sm:h-5 border-2 border-gray-300 dark:border-gray-700 rounded peer-checked:bg-primary peer-checked:border-primary transition-all flex items-center justify-center">
                                    <i class="fas fa-check text-[8px] sm:text-[10px] text-white opacity-0 peer-checked:opacity-100"></i>
                                </div>
                                <span class="text-[11px] sm:text-xs font-bold text-gray-500">Remember me</span>
                            </label>
                            <button type="button" @click="isForgot = true" class="text-[11px] sm:text-xs font-bold text-primary hover:underline">Forgot Password?</button>
                        </div>

                        <button type="submit" class="w-full py-4 sm:py-5 bg-primary text-white rounded-xl sm:rounded-[1.5rem] font-black text-base sm:text-lg shadow-xl shadow-indigo-200 dark:shadow-none hover:bg-indigo-700 transition-all active:scale-95">
                            Login Now
                        </button>
                    </form>

                    <p class="mt-8 sm:mt-10 text-center text-xs sm:text-sm text-gray-500 font-medium">
                        New here? <a href="regeister.html" class="text-primary font-bold hover:underline">Register</a>
                    </p>
                </div>

                <div x-show="isForgot" x-cloak x-transition:enter="transition ease-out duration-300" x-transition:enter-start="opacity-0 translate-x-8">
                    <button @click="isForgot = false" class="mb-6 sm:mb-8 text-xs sm:text-sm font-bold text-gray-400 hover:text-primary flex items-center gap-2">
                        <i class="fas fa-arrow-left text-xs"></i> Back
                    </button>
                    <h3 class="text-2xl sm:text-3xl font-black mb-3 dark:text-white">Reset</h3>
                    <p class="text-gray-500 mb-8 text-sm leading-relaxed">Enter your email for a magic link.</p>
                    
                    <form class="space-y-6">
                        <input type="email" required placeholder="name@email.com" class="w-full px-5 py-3.5 sm:py-4 rounded-xl sm:rounded-2xl bg-gray-50 dark:bg-gray-800 border-2 border-transparent focus:border-primary focus:outline-none dark:text-white text-sm">
                        <button class="w-full py-4 sm:py-5 bg-primary text-white rounded-xl sm:rounded-[1.5rem] font-black text-lg">Send Link</button>
                    </form>
                </div>

            </div>
        </div>
    </main>

</body>
</html>
